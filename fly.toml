# fly.toml - Fly.io configuration for TempMail API
# Replace "tempmail-api" with your chosen app name

app = "tempmail-api"
primary_region = "iad"  # Change to your preferred region (e.g., lhr, sin, syd)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 10
    soft_limit = 5

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024  # Playwright needs at least 512MB, 1GB recommended

[env]
  PORT = "8080"
  NODE_ENV = "production"
